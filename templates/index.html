<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF → Excel Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 6px; color: #1a1a2e; }
    p.sub { color: #666; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1rem; margin-bottom: 16px; color: #444; }
    .drop-zone {
      border: 2px dashed #c0c8d8;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #5c6bc0;
      background: #f0f2ff;
    }
    .drop-zone input { display: none; }
    .drop-zone label {
      display: block;
      font-size: 0.9rem;
      color: #888;
      cursor: pointer;
    }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #5c6bc0; color: #fff; width: 100%; margin-top: 16px; }
    .btn-success { background: #43a047; color: #fff; }
    .btn-outline  { background: transparent; border: 1.5px solid #5c6bc0; color: #5c6bc0; }
    .actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .status-bar {
      background: #e8f5e9;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #2e7d32;
      display: none;
    }
    .error-bar {
      background: #ffebee;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #c62828;
      display: none;
    }
    #file-name { font-size: 0.85rem; color: #5c6bc0; margin-top: 8px; min-height: 20px; }
  </style>
</head>
<body>

<h1>PDF → Excel Automation</h1>
<p class="sub">Upload instrument datasheets. Data extracts automatically into your master sheet.</p>

<!-- Upload Card -->
<div class="card">
  <h2>Upload PDF</h2>
  <div class="drop-zone" id="drop-zone">
    <div class="icon">📄</div>
    <label for="pdf-input">
      Drag & drop PDF here, or <strong>click to browse</strong>
      <input type="file" id="pdf-input" accept=".pdf" multiple>
    </label>
  </div>
  <div id="file-name"></div>
  <div id="status-bar"  class="status-bar"></div>
  <div id="error-bar"   class="error-bar"></div>
  <button class="btn btn-primary" onclick="uploadFiles()">Extract & Update Master Sheet</button>
</div>

<!-- Actions Card -->
<div class="card">
  <h2>Actions</h2>
  <div class="actions">
    <a href="/download" class="btn btn-success">⬇ Download master.xlsx</a>
    <button class="btn btn-outline" onclick="pollEmail()">📧 Check Email Now</button>
    <button class="btn btn-outline" onclick="checkStatus()">📊 View Status</button>
  </div>
  <div id="info" style="margin-top:14px;font-size:0.85rem;color:#555;"></div>
</div>

<script>
  const input    = document.getElementById("pdf-input");
  const dropZone = document.getElementById("drop-zone");
  const fileName = document.getElementById("file-name");
  const statusBar = document.getElementById("status-bar");
  const errorBar  = document.getElementById("error-bar");
  const info      = document.getElementById("info");

  input.addEventListener("change", () => {
    const names = Array.from(input.files).map(f => f.name).join(", ");
    fileName.textContent = names ? `Selected: ${names}` : "";
  });

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    input.files = e.dataTransfer.files;
    const names = Array.from(input.files).map(f => f.name).join(", ");
    fileName.textContent = `Selected: ${names}`;
  });

  function showStatus(msg) {
    statusBar.style.display = "block";
    statusBar.textContent = msg;
    errorBar.style.display = "none";
  }
  function showError(msg) {
    errorBar.style.display = "block";
    errorBar.textContent = msg;
    statusBar.style.display = "none";
  }

  async function uploadFiles() {
    if (!input.files.length) { showError("Please select at least one PDF."); return; }
    showStatus("Processing...");
    let total = 0;
    for (const file of input.files) {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch("/upload", { method: "POST", body: fd });
      const data = await res.json();
      if (res.ok) total += data.records_found;
      else { showError(data.error || "Upload failed."); return; }
    }
    showStatus(`✅ Done! ${total} record(s) added to master sheet.`);
    fileName.textContent = "";
    input.value = "";
  }

  async function pollEmail() {
    info.textContent = "Checking email...";
    const res  = await fetch("/poll-email", { method: "POST" });
    const data = await res.json();
    if (res.ok) info.textContent = `📧 ${data.pdfs_fetched} PDF(s) fetched, ${data.records_added} records added.`;
    else        info.textContent = `Error: ${data.error}`;
  }

  async function checkStatus() {
    const res  = await fetch("/status");
    const data = await res.json();
    info.textContent = data.file_exists
      ? `📊 Master sheet has ${data.rows} row(s).`
      : "No master sheet yet. Upload some PDFs first.";
  }
</script>
</body>
</html>
